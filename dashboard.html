<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goldance 2026 — Dashboard de Resultados</title>
<style>
  :root{
    --bg: #f3ecdc;
    --bg-elev: #fffdf8;
    --gold: #b8842f;
    --gold-bright: #6e4f18;
    --cream: #1c160e;
    --muted: #6b5f47;
    --line: #e2d6bd;
    --oro: #c9a227;
    --plata: #9a9a9a;
    --bronce: #b0702f;
    --desierto: #8a7d63;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;}
  .app{max-width:1300px;margin:0 auto;padding:24px 28px 60px;}

  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;
    padding-bottom:18px;border-bottom:2px solid var(--gold);margin-bottom:20px;}
  header .marca-wrap{display:flex;align-items:center;gap:16px;}
  header img{height:70px;}
  header .titulo{font-size:22px;font-weight:700;color:var(--gold-bright);}
  header .sub{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;}
  .filtros{display:flex;gap:8px;align-items:center;}
  .filtros select{background:var(--bg-elev);border:1px solid var(--line);color:var(--cream);
    border-radius:10px;padding:9px 14px;font-size:14px;}
  .estado{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .dot{width:8px;height:8px;border-radius:50%;background:#5fae7a;}

  .barra-tiempo{background:var(--bg-elev);border:1px solid var(--line);border-radius:14px;
    padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:14px;}
  .barra-tiempo .bloque{display:flex;align-items:center;gap:10px;}
  .barra-tiempo .bloque .valor{font-size:20px;font-weight:800;color:var(--gold-bright);font-variant-numeric:tabular-nums;}
  .barra-tiempo .bloque .etq{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .barra-progreso{flex:1;min-width:180px;height:10px;background:var(--line);border-radius:6px;overflow:hidden;}
  .barra-progreso .relleno{height:100%;background:linear-gradient(90deg, var(--gold), var(--gold-bright));}

  .grid-medallas{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
  .card-medalla{background:var(--bg-elev);border:1px solid var(--line);border-radius:16px;
    padding:22px;text-align:center;}
  .card-medalla .num{font-size:44px;font-weight:800;}
  .card-medalla .label{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-top:4px;}
  .card-medalla.oro .num{color:var(--oro);}
  .card-medalla.plata .num{color:var(--plata);}
  .card-medalla.bronce .num{color:var(--bronce);}
  .card-medalla.desierto .num{color:var(--desierto);}

  .secciones{display:grid;grid-template-columns:1.3fr 1fr;gap:24px;}
  @media (max-width: 900px){ .secciones{grid-template-columns:1fr;} }

  .panel{background:var(--bg-elev);border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:24px;}
  .panel h2{font-size:15px;color:var(--gold-bright);margin:0 0 16px;text-transform:uppercase;letter-spacing:1px;
    border-bottom:1px solid var(--line);padding-bottom:10px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  table th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;
    padding:6px 8px;border-bottom:2px solid var(--line);}
  table td{padding:9px 8px;border-bottom:1px solid var(--line);}
  table tr:last-child td{border-bottom:none;}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge.oro{background:rgba(201,162,39,0.18);color:var(--oro);}
  .badge.plata{background:rgba(154,154,154,0.2);color:#6d6d6d;}
  .badge.bronce{background:rgba(176,112,47,0.18);color:var(--bronce);}
  .rank-num{font-weight:800;color:var(--gold-bright);width:26px;display:inline-block;}
  .medal-tally{display:flex;gap:8px;font-size:12px;}
  .medal-tally span{display:flex;align-items:center;gap:3px;}

  .empty-msg{color:var(--muted);font-size:13px;text-align:center;padding:20px;}
  .btn-secundario{background:none;border:1.5px solid var(--gold);color:var(--gold-bright);
    border-radius:10px;padding:9px 16px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;}

  .estado-ok{color:#5fae7a;font-weight:700;}
  .estado-error{color:#d9613a;font-weight:700;}
  .estado-pendiente{color:var(--muted);}
  .desglose-jurados{font-size:11px;color:var(--muted);margin-top:2px;}
  .tabla-scroll{max-height:420px;overflow-y:auto;}
  .panel-full{grid-column:1 / -1;}
</style>
</head>
